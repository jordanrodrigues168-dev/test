name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # We inject the fix for AAPT2 directly into the runner's gradle.properties
      - name: Fix AAPT2 for CI
        run: |
          echo "android.aapt2FromMaven=true" >> gradle.properties
          echo "android.useUnifiedManifestPlatform=true" >> gradle.properties

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZukuTools-Debug-APK
          # Line 44 Fix: Ensuring this path is exactly where Gradle outputs it
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
		  