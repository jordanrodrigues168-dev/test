name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # This ensures the runner recognizes the Android SDK paths
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Force AAPT2 to download from Maven instead of looking for a local system binary
      - name: Fix AAPT2 and Manifest issues
        run: |
          echo "android.aapt2FromMaven=true" >> gradle.properties
          echo "android.useUnifiedManifestPlatform=true" >> gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZukuTools-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
		  